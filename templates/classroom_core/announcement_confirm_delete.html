{% extends "classroom_core/base_courses.html" %}

{% block title %}🗑️ Удалить объявление{% endblock %}

{% block courses_content %}
<style>
   .theme {
        background: var(--bg-page-gradient);
        min-height: 100vh;
        padding: 2rem 1rem;
    }
    
   .delete-card {
        background: var(--bg-card);
        backdrop-filter: blur(10px);
        border: 1px solid var(--bg-overlay-30);
        border-radius: 20px;
        box-shadow: 0 10px 30px var(--shadow-card), 0 0 20px var(--bg-overlay-30);
        transition: all 0.3s ease;
        animation: cardAppear 0.5s ease-out;
    }
    
   .delete-card:hover {
        box-shadow: 0 15px 40px var(--shadow-card-hover), 0 0 30px var(--accent-glow-strong);
        transform: translateY(-5px);
    }
    
    @keyframes cardAppear {
        0% {
            opacity: 0;
            transform: translateY(20px);
        }
        100% {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
   .warning-icon {
        font-size: 4rem;
        background: linear-gradient(135deg, var(--status-danger), var(--status-danger-light));
        background-clip: text;
        -webkit-text-fill-color: transparent;
        display: inline-block;
        animation: pulseWarning 2s infinite;
        filter: drop-shadow(0 0 15px var(--text-glow-danger));
    }
    
    @keyframes pulseWarning {
        0%, 100% {
            transform: scale(1);
            filter: drop-shadow(0 0 15px var(--text-glow-danger));
        }
        50% {
            transform: scale(1.1);
            filter: drop-shadow(0 0 25px var(--text-glow-danger));
        }
    }
    
   .delete-title {
        color: var(--text-white);
        font-size: 2rem;
        font-weight: 600;
        text-shadow: 0 0 10px var(--accent-glow-strong);
        margin-bottom: 1.5rem;
        background: linear-gradient(135deg, var(--text-white), var(--text-muted));
        background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    
   .announcement-alert {
        background: var(--bg-overlay-15);
        border: 1px solid var(--border-accent-hover);
        border-radius: 12px;
        padding: 1.2rem;
        margin: 1.5rem 0;
        backdrop-filter: blur(5px);
        animation: glowPulse 2s infinite;
    }
    
    @keyframes glowPulse {
        0%, 100% {
            border-color: var(--border-accent-hover);
            box-shadow: 0 0 10px var(--bg-overlay-20);
        }
        50% {
            border-color: var(--border-accent-hover);
            box-shadow: 0 0 20px var(--border-accent-hover);
        }
    }
    
   .announcement-title {
        color: var(--text-white);
        font-size: 1.3rem;
        font-weight: 500;
        margin: 0;
        word-break: break-word;
    }
    
   .warning-text {
        color: var(--text-secondary); !important;
        font-size: 1.1rem;
        margin: 1.5rem 0;
        line-height: 1.6;
    }
    
   .btn-delete {
        background: linear-gradient(135deg, var(--status-danger), var(--status-danger-light));
        border: none;
        border-radius: 12px;
        padding: 0.8rem 2rem;
        font-weight: 600;
        color: white;
        transition: all 0.3s ease;
        box-shadow: 0 5px 15px var(--status-danger-border);
        position: relative;
        overflow: hidden;
    }
    
   .btn-delete:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px var(--text-glow-danger);
        background: linear-gradient(135deg, var(--status-danger-light), var(--status-danger));
    }
    
   .btn-delete:active {
        transform: translateY(0);
    }
    
   .btn-delete::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: var(--shimmer-overlay);
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
    }
    
   .btn-delete:hover::after {
        width: 300px;
        height: 300px;
    }
    
   .btn-cancel {
        background: var(--bg-overlay-20);
        border: 1px solid var(--accent-glow-strong);
        border-radius: 12px;
        padding: 0.8rem 2rem;
        font-weight: 600;
        color: var(--text-muted);
        transition: all 0.3s ease;
        text-decoration: none;
        position: relative;
        overflow: hidden;
    }
    
   .btn-cancel:hover {
        background: var(--bg-overlay-30);
        border-color: var(--border-accent-hover);
        color: var(--text-white);
        transform: translateY(-2px);
        box-shadow: 0 5px 20px var(--border-accent-hover);
    }
    
   .btn-cancel:active {
        transform: translateY(0);
    }
    
   .button-container {
        display: flex;
        gap: 1rem;
        justify-content: center;
        margin-top: 2rem;
        flex-wrap: wrap;
    }
    
   .button-container form,
   .button-container a {
        flex: 0 1 auto;
        min-width: 140px;
    }
    
    
    @media(max-width: 576px) {
       .theme {
            padding: 1rem 0.5rem;
        }
        
       .delete-card {
            border-radius: 15px;
        }
        
       .delete-title {
            font-size: 1.5rem;
        }
        
       .warning-icon {
            font-size: 3rem;
        }
        
       .announcement-title {
            font-size: 1.1rem;
        }
        
       .button-container {
            flex-direction: column;
            align-items: stretch;
            gap: 0.8rem;
        }
        
       .button-container form,
       .button-container a {
            width: 100%;
            min-width: auto;
        }
        
       .btn-delete,
       .btn-cancel {
            width: 100%;
            text-align: center;
            padding: 0.7rem 1.5rem;
        }
    }
    
    
    @media(min-width: 577px) and(max-width: 768px) {
       .delete-card {
            margin: 0 1rem;
        }
        
       .delete-title {
            font-size: 1.8rem;
        }
    }
    
    
    @media(min-width: 1400px) {
       .delete-card {
            max-width: 700px;
            margin: 0 auto;
        }
    }
</style>

<div class="theme">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10 col-sm-12">
            <div class="delete-card">
                <div class="card-body text-center p-4 p-md-5">
                    <div class="warning-icon mb-3">
                        <i class="bi bi-exclamation-triangle"></i>
                    </div>
                    
                    <h3 class="delete-title">Удалить объявление?</h3>
                    
                    <div class="announcement-alert">
                        <strong class="announcement-title">{{ announcement.title }}</strong>
                    </div>
                    
                    <p class="warning-text">
                        <i class="bi bi-info-circle me-2"></i>
                        Объявление будет удалено безвозвратно. Это действие нельзя отменить.
                    </p>
                    
                    <div class="button-container">
                        <form method="post">
                            {% csrf_token %}
                            <button type="submit" class="btn-delete">
                                <i class="bi bi-trash me-2"></i>Да, удалить
                            </button>
                        </form>
                        <a href="{% url 'classroom_core:course_detail' course.id %}" class="btn-cancel">
                            <i class="bi bi-x-circle me-2"></i>Отмена
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
