{% extends "base.html" %}

{% block title %}Восстановление пароля{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card p-4">
                <h4 class="mb-3">Восстановление пароля</h4>
                <p class="text-muted">Введите email, и мы отправим ссылку для сброса пароля.</p>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100">Отправить ссылку</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
