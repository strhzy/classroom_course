{% extends "base.html" %}
{% load static %}

{% block title %}Пароль обновлён{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth-flow.css' %}">
{% endblock %}

{% block content %}
<div class="auth-flow">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6 col-xl-5">
                <div class="auth-card">
                    <div class="auth-card__accent" aria-hidden="true"></div>
                    <div class="auth-card__body auth-success-panel">
                        <div class="auth-card__icon" aria-hidden="true"><i class="bi bi-check-lg"></i></div>
                        <h1 class="auth-card__title">Пароль изменён</h1>
                        <p class="auth-card__lead">
                            Новый пароль сохранён. Теперь можно войти в систему с обновлёнными данными.
                        </p>
                        <div class="d-grid mt-3">
                            <a href="{% url 'classroom_core:login' %}" class="btn auth-btn-primary">Войти</a>
                        </div>
                        <div class="auth-card__footer">
                            <a href="{% url 'classroom_core:course_list' %}">На главную курсов</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
