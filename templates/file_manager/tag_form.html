{% extends "file_manager/base_files.html" %}

{% block title %}Новый тег{% endblock %}

{% block files_content %}
<style>
   .theme-tag-form {
        background: var(--bg-page-gradient);
        min-height: 100vh;
        padding: 2rem 1rem;
    }

   .page-header {
        margin-bottom: 2rem;
    }

   .page-title {
        font-size: 2rem;
        font-weight: 700;
        background: linear-gradient(135deg, var(--text-white), var(--text-muted));
        background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 0 0 0.5rem 0;
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

   .page-title i {
        color: var(--accent-primary);
        -webkit-text-fill-color: var(--accent-primary);
        font-size: 2.2rem;
    }

   .form-card {
        background: var(--bg-card);
        backdrop-filter: blur(10px);
        border: 1px solid var(--bg-overlay-30);
        border-radius: 20px;
        box-shadow: 0 10px 30px var(--shadow-card);
        overflow: hidden;
        max-width: 520px;
    }

   .card-header-custom {
        background: linear-gradient(135deg, var(--bg-overlay-20), var(--status-info-bg));
        border-bottom: 1px solid var(--bg-overlay-30);
        padding: 1.2rem 1.5rem;
    }

   .card-header-custom h5 {
        color: var(--text-white);
        font-size: 1.15rem;
        margin: 0;
        display: flex;
        align-items: center;
        gap: 0.6rem;
    }

   .card-header-custom i {
        color: var(--accent-primary);
    }

   .card-body-custom {
        padding: 2rem;
    }

   .form-group {
        margin-bottom: 1.5rem;
    }

   .form-label {
        color: var(--text-muted);
        font-weight: 600;
        margin-bottom: 0.5rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

   .form-label i {
        color: var(--accent-primary);
    }

   .theme-tag-form .form-control {
        background: var(--bg-input);
        border: 1px solid var(--bg-overlay-30);
        border-radius: 10px;
        padding: 0.8rem 1rem;
        color: var(--text-white);
        font-size: 1rem;
        width: 100%;
    }

   .theme-tag-form .form-control:focus {
        outline: none;
        border-color: var(--accent-primary);
        box-shadow: none;
    }

   .theme-tag-form input[type="color"].form-control {
        height: 3rem;
        padding: 0.35rem;
        cursor: pointer;
    }

   .form-text {
        color: var(--text-disabled);
        font-size: 0.85rem;
        margin-top: 0.4rem;
    }

   .button-group {
        display: flex;
        gap: 1rem;
        margin-top: 1.5rem;
    }

   .btn-save {
        background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
        border: none;
        border-radius: 10px;
        padding: 0.8rem 2rem;
        font-weight: 600;
        color: white;
        flex: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        cursor: pointer;
    }

   .btn-save:hover {
        filter: brightness(1.05);
    }

   .btn-cancel {
        background: var(--bg-overlay-15);
        border: 1px solid var(--accent-glow-strong);
        border-radius: 10px;
        padding: 0.8rem 2rem;
        font-weight: 600;
        color: var(--text-muted);
        text-decoration: none;
        flex: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
    }

   .btn-cancel:hover {
        border-color: var(--accent-primary);
        color: var(--text-white);
    }

    @media (max-width: 768px) {
       .button-group {
            flex-direction: column;
        }
    }
</style>

<div class="theme-tag-form">
    <div class="container">
        <div class="page-header">
            <h1 class="page-title">
                <i class="bi bi-tag"></i>
                Новый тег
            </h1>
        </div>

        <div class="form-card">
            <div class="card-header-custom">
                <h5>
                    <i class="bi bi-pencil-square"></i>
                    Параметры тега
                </h5>
            </div>
            <div class="card-body-custom">
                <form method="post" action="">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="id_name" class="form-label">
                            <i class="bi bi-type"></i>
                            Название
                        </label>
                        {{ form.name }}
                    </div>
                    <div class="form-group">
                        <label for="id_color" class="form-label">
                            <i class="bi bi-palette"></i>
                            Цвет
                        </label>
                        {{ form.color }}
                        <div class="form-text">Используется для отображения меток в списке файлов.</div>
                    </div>
                    <div class="button-group">
                        <button type="submit" class="btn-save">
                            <i class="bi bi-check-lg"></i>
                            Создать
                        </button>
                        <a href="{% url 'file_manager:tag_list' %}" class="btn-cancel">
                            <i class="bi bi-x-lg"></i>
                            Отмена
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
