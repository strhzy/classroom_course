{% extends "base.html" %}

{% block content %}
<style>
    
   .file-nav {
        background: var(--bg-card);
        border-bottom: 1px solid var(--border-accent-light);
        box-shadow: var(--shadow-item);
        padding: 0.6rem 1rem;
    }
    
   .file-nav .navbar-nav {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
    }
    
   .file-nav .nav-link {
        color: var(--text-muted) !important;
        padding: 0.45rem 0.9rem !important;
        border-radius: 10px;
        transition: background-color 0.2s ease, color 0.2s ease;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        border: 1px solid transparent;
    }
    
   .file-nav .nav-link:hover {
        color: var(--text-white) !important;
        background: var(--bg-overlay-15);
    }
    
   .file-nav .nav-link.active {
        background: var(--bg-overlay-15);
        color: var(--text-white) !important;
        border: 1px solid var(--border-accent);
    }
    
   .file-nav .nav-link i {
        color: var(--accent-primary);
        font-size: 1.2rem;
    }
    
   .file-nav .nav-link.active i {
        color: var(--text-white);
    }
    
    
   .storage-alert {
        background: var(--bg-card) !important;
        border: 1px solid var(--border-accent-light) !important;
        border-radius: 12px !important;
        color: var(--text-white) !important;
        margin: 0.8rem 1rem !important;
        padding: 0.8rem 1rem !important;
        box-shadow: var(--shadow-item);
    }
    
   .storage-alert.alert-success {
        border-left: 5px solid var(--status-success) !important;
    }
    
   .storage-alert.alert-warning {
        border-left: 5px solid var(--status-warning) !important;
    }
    
   .storage-alert.alert-danger {
        border-left: 5px solid var(--status-danger) !important;
    }
    
   .storage-label {
        color: var(--text-muted);
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }
    
   .storage-label i {
        color: var(--accent-primary);
        font-size: 1.2rem;
    }
    
   .storage-value {
        color: var(--text-white);
        font-weight: 500;
        background: var(--bg-overlay-15);
        padding: 0.3rem 1rem;
        border-radius: 50px;
        margin-left: 0.5rem;
    }

   .storage-percent {
        color: var(--text-muted);
        font-weight: 600;
        margin-left: 0.5rem;
        min-width: 4.5rem;
        text-align: right;
    }
    
   .storage-progress {
        width: 250px;
        height: 30px;
        background: var(--bg-input) !important;
        border-radius: 15px !important;
        border: 1px solid var(--bg-overlay-30);
        overflow: hidden;
    }
    
   .storage-progress-bar {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.85rem;
        font-weight: 600;
        transition: width 0.3s ease;
        text-shadow: 0 1px 2px var(--shadow-item);
    }
    
   .storage-progress-bar.bg-success {
        background: linear-gradient(90deg, var(--status-success), var(--status-success)) !important;
    }
    
   .storage-progress-bar.bg-warning {
        background: linear-gradient(90deg, var(--status-warning), var(--status-warning)) !important;
        color: var(--bg-page-start);
    }
    
   .storage-progress-bar.bg-danger {
        background: linear-gradient(90deg, var(--status-danger), var(--status-danger-light)) !important;
    }
    
    
   .file-main-content {
        background: var(--bg-page-gradient);
        min-height: calc(100vh - 70px);
        padding: 2rem 1rem;
    }
    
   .file-content-container {
        background: transparent;
        border: none;
        border-radius: 0;
        padding: 0;
        box-shadow: none;
    }
    
    
    @media(max-width: 768px) {
       .file-nav .navbar-nav {
            flex-direction: column;
            width: 100%;
            gap: 0.3rem;
        }
        
       .file-nav .nav-link {
            width: 100%;
            justify-content: center;
        }
        
       .storage-alert.d-flex {
            flex-direction: column;
            align-items: flex-start !important;
            gap: 1rem;
        }
        
       .storage-progress {
            width: 100%;
        }
        
       .file-main-content {
            padding: 1rem 0.5rem;
        }
        
       .file-content-container {
            padding: 1rem;
        }
    }
    
    @media(min-width: 769px) and(max-width: 992px) {
       .file-nav .nav-link {
            padding: 0.5rem 1rem !important;
            font-size: 0.9rem;
        }
        
       .file-nav .nav-link i {
            font-size: 1rem;
        }
        
       .storage-progress {
            width: 200px;
        }
    }
</style>


<nav class="navbar navbar-expand-lg file-nav">
    <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#fileNavbar" 
                style="background: var(--bg-overlay-30); border: 1px solid var(--accent-glow-strong);">
            <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
        </button>
        <div class="collapse navbar-collapse" id="fileNavbar">
            <div class="navbar-nav">
                <a class="nav-link {% if request.resolver_match.url_name == 'file_list' %}active{% endif %}" 
                   href="{% url 'file_manager:file_list' %}">
                    <i class="bi bi-files"></i>
                    <span>Все файлы</span>
                </a>
                <a class="nav-link {% if request.resolver_match.url_name == 'activity_log' %}active{% endif %}" 
                   href="{% url 'file_manager:activity_log' %}">
                    <i class="bi bi-clock-history"></i>
                    <span>История</span>
                </a>
            </div>
        </div>
    </div>
</nav>


{% if storage_quota %}
<div class="storage-alert alert" id="storage-quota-alert">
    <div class="d-flex justify-content-between align-items-center">
        <div class="storage-label">
            <i class="bi bi-database"></i>
            <span>Хранилище:</span>
            <span class="storage-value" id="storage-quota-display">Загрузка...</span>
            <span class="storage-percent" id="storage-quota-percent">0%</span>
        </div>
        <div class="storage-progress" id="storage-quota-progress">
            <div class="storage-progress-bar bg-success" 
                 id="storage-quota-bar"
                 role="progressbar" 
                 style="width: 0%"
                 aria-valuenow="0" 
                 aria-valuemin="0" 
                 aria-valuemax="100">
                0%
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    function formatBytes(bytes) {
        if(bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }
    
    function getAlertClass(percentage) {
        if(percentage >= 95) {
            return 'alert-danger';
        } else if(percentage >= 80) {
            return 'alert-warning';
        } else {
            return 'alert-success';
        }
    }
    
    function getProgressBarClass(percentage) {
        if(percentage >= 95) {
            return 'bg-danger';
        } else if(percentage >= 80) {
            return 'bg-warning';
        } else {
            return 'bg-success';
        }
    }
    
    function updateStorageQuota(usedBytes, totalQuota) {
        const percentage = totalQuota > 0 ? (usedBytes / totalQuota) * 100 : 0;
        const safePercentage = Math.max(0, Math.min(percentage, 100));
        const percentageText = percentage.toFixed(1) + '%';
        
        const progressBar = document.getElementById('storage-quota-bar');
        if(progressBar) {
            progressBar.style.width = safePercentage + '%';
            progressBar.textContent = safePercentage >= 18 ? percentageText : '';
            progressBar.setAttribute('aria-valuenow', safePercentage.toFixed(1));
            progressBar.title = percentageText;
            
            const currentClasses = progressBar.className.split(' ');
            const newClasses = currentClasses.filter(cls => !cls.startsWith('bg-'));
            newClasses.push(getProgressBarClass(percentage));
            progressBar.className = newClasses.join(' ');
        }

        const percentDisplay = document.getElementById('storage-quota-percent');
        if(percentDisplay) {
            percentDisplay.textContent = percentageText;
        }
        
        const quotaDisplay = document.getElementById('storage-quota-display');
        if(quotaDisplay) {
            quotaDisplay.textContent = formatBytes(usedBytes) + ' / ' + formatBytes(totalQuota);
        }
        
        const alertElement = document.getElementById('storage-quota-alert');
        if(alertElement) {
            const currentClasses = alertElement.className.split(' ');
            const newClasses = currentClasses.filter(cls => !cls.startsWith('alert-') && cls !== '');
            newClasses.push(getAlertClass(percentage));
            alertElement.className = newClasses.join(' ');
        }
    }
    
    function fetchStorageQuota() {
        function getCookie(name) {
            let cookieValue = null;
            if(document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for(let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if(cookie.substring(0, name.length + 1) ===(name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        
        const csrftoken = getCookie('csrftoken');
        
        fetch('/files/api/storage-quota/', {
            method: 'GET',
            headers: {
                'X-CSRFToken': csrftoken,
                'Accept': 'application/json',
                'Content-Type': 'application/json'
            }
        })
       .then(response => {
            if(!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.json();
        })
       .then(data => {
            if(data.used_bytes !== undefined && data.total_quota_bytes !== undefined) {
                updateStorageQuota(data.used_bytes, data.total_quota_bytes);
            } else {
                document.getElementById('storage-quota-display').textContent = 'Ошибка загрузки данных';
            }
        })
       .catch(error => {
            console.error('Error fetching storage quota:', error);
            document.getElementById('storage-quota-display').textContent = 'Ошибка подключения';
        });
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        fetchStorageQuota();
    });
    
    window.updateStorageQuota = updateStorageQuota;
    window.fetchStorageQuota = fetchStorageQuota;
    window.formatBytes = formatBytes;
})();
</script>
{% endif %}


<div class="file-main-content">
    <div class="container-fluid">
        <div class="row">
            <div class="col-12">
                <div class="file-content-container">
                    {% block files_content %}{% endblock %}
                </div>
            </div>
        </div>
    </div>
</div>


<script>
    document.addEventListener('click', function(e) {
        if(window.innerWidth <= 768) {
            const navbarCollapse = document.getElementById('fileNavbar');
            const toggler = document.querySelector(' .navbar-toggler');
            
            if(navbarCollapse && toggler) {
                if(!navbarCollapse.contains(e.target) && !toggler.contains(e.target)) {
                    navbarCollapse.classList.remove('show');
                }
            }
        }
    });
</script>
{% endblock %}
