# Прод: приложение + PostgreSQL + Redis + Adminer.
# Один файл окружения: скопируйте .env.example → .env и задайте секреты.
# Сервисы db и web читают .env через env_file; тот же файл монтируется в /app/.env для Django.
#
# Сервис web: network_mode: host (в первую очередь Linux) — исходящий HTTPS как у хоста
# (обмен code→token с oauth.yandex.ru). Postgres/Redis — на 127.0.0.1 с проброшенных портов db/redis.
# Порт приложения: 8000 на хосте (см. entrypoint: daphne -b 0.0.0.0 -p 8000). Секция ports у web не используется.
# Docker Desktop (Windows/macOS): host network для сервисов часто недоступен — тогда уберите network_mode/host
# и блок environment с DJANGO_DOCKER_HOST_NETWORK, верните подключение к db/redis по имени сервисов.
#
# ClamAV: базы сигнатур в volume clamav_data; образ и процесс web — root, в entrypoint стартуют freshclam + clamd.
#
# Сборка образа web: если apt пишет «Temporary failure resolving deb.debian.org»,
# на Linux обычно помогает build.network: host (ниже). Альтернатива: в
# /etc/docker/daemon.json указать "dns": ["8.8.8.8","1.1.1.1"] и перезапустить Docker.
# На Docker Desktop (Windows/Mac) при сбоях сборки уберите network: host у web.build.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      network: host
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      DJANGO_DOCKER_HOST_NETWORK: "true"
      POSTGRES_HOST: "127.0.0.1"
      REDIS_URL: "redis://127.0.0.1:6379/0"
      REDIS_CACHE_URL: "redis://127.0.0.1:6379/1"
    volumes:
      - media_data:/app/media
      - backups_data:/app/backups
      - clamav_data:/var/lib/clamav
      - ./.env:/app/.env:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  adminer:
    image: adminer:4
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  media_data:
  backups_data:
  clamav_data: